<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0d1117">
  <title>Mimesis Player Enhancement</title>
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/settings.css">
</head>

<body class="waiting" x-data="dashboard()" x-init="init()">
  <div class="bg-layer" aria-hidden="true"></div>
  <div class="bg-scrim" aria-hidden="true"></div>

  <div class="app">
    <div class="app-top">
      <header class="app-header">
        <div class="app-header-inner">
          <div class="app-brand">
            <h1>
              <a class="app-brand-title" :href="status.isConnected ? '#/players' : '#/waiting'" x-text="pageTitle"></a>
            </h1>
            <p class="app-subtitle" x-text="subtitle"></p>
          </div>
          <nav class="app-header-actions" aria-label="Dashboard navigation">
            <a class="app-header-link" href="#/players" x-show="status.isConnected" :class="{ active: isGameRoute }"
              x-text="t('dashboard.nav_game')"></a>
            <a class="app-header-link" href="#/global-settings" :class="{ active: route === 'global-settings' }"
              x-text="t('dashboard.nav_global_settings')"></a>
            <a class="app-header-link" href="#/donation" :class="{ active: route === 'donation' }"
              x-text="t('dashboard.nav_donation')"></a>
            <div class="app-header-blind" x-show="status.isHost && status.isConnected" x-cloak>
              <span class="app-header-blind-label" x-text="t('dashboard.blind_mode')"></span>
              <button type="button" class="feature-toggle" role="switch"
                :class="{ 'is-on': playerBlindModeUserEnabled }" :title="t('dashboard.blind_mode_title')"
                :aria-label="t('dashboard.blind_mode')" @click="togglePlayerBlindMode">
                <span class="feature-toggle-track" aria-hidden="true">
                  <span class="feature-toggle-thumb"></span>
                </span>
                <span class="feature-toggle-label"
                  x-text="playerBlindModeUserEnabled ? t('dashboard.on') : t('dashboard.off')"></span>
              </button>
            </div>
          </nav>
        </div>
      </header>

      <nav class="app-nav" aria-label="Main navigation" x-show="status.isConnected" x-cloak>
        <ul>
          <li>
            <a href="#/players" :class="{ active: route === 'players' }" x-text="t('dashboard.nav_players')"></a>
          </li>
          <li>
            <a href="#/minimap" :class="{ active: route === 'minimap' }" x-text="t('dashboard.nav_minimap')"></a>
          </li>
          <li x-show="status.isHost">
            <a href="#/leaderboard" :class="{ active: route === 'leaderboard' }"
              x-text="t('dashboard.nav_leaderboard')"></a>
          </li>
          <li x-show="status.isHost">
            <a href="#/settings" :class="{ active: route === 'settings' }" x-text="t('dashboard.nav_settings')"></a>
          </li>
        </ul>
      </nav>
    </div>

    <main class="app-main">
      <div class="app-content">
        <section id="view" aria-live="polite">

          <!-- Donation -->
          <div x-show="route === 'donation'" x-cloak>
            <h2 class="page-heading" x-text="t('dashboard.donation_heading')"></h2>
            <div class="donation-panel surface-card">
              <p class="donation-lead" x-text="t('dashboard.donation_lead')"></p>
              <p x-text="t('dashboard.donation_body1')"></p>
              <p x-text="t('dashboard.donation_body2')"></p>
              <p class="donation-action">
                <a class="donation-button" href="https://www.paypal.com/donate/?hosted_button_id=C2AVYKGVP9TRG"
                  target="_blank" rel="noopener noreferrer">
                  <img src="https://www.paypalobjects.com/en_US/i/btn/btn_donateCC_LG.gif" alt="Donate with PayPal"
                    width="147" height="47" loading="lazy" decoding="async">
                </a>
              </p>
              <p class="donation-footnote">
                The mod stays free and open source either way. Please also support the original mod authors listed in
                the
                <a class="external-link" href="https://github.com/Kandru/mimesis-player-enhancements" target="_blank"
                  rel="noopener noreferrer">GitHub README</a>.
              </p>
            </div>
          </div>

          <!-- Waiting (main menu, session ended, or game closed) -->
          <div x-show="!status.isConnected && !isOfflineRoute()" class="waiting-panel">
            <div class="waiting-card">
              <div class="spinner" role="progressbar" aria-label="Waiting for game" x-show="!apiError"></div>
              <h2 x-text="apiError ? t('dashboard.waiting_unavailable') : t('dashboard.waiting_not_connected')"></h2>
              <p x-text="apiError ? t('dashboard.waiting_api_error') : t('dashboard.waiting_connect_hint')"></p>
            </div>
          </div>

          <!-- Players -->
          <div x-show="status.isConnected && route === 'players'" x-cloak>
            <div class="page-heading-row">
              <h2 class="page-heading" x-text="t('dashboard.players_heading')"></h2>
              <span class="page-heading-count" x-show="connectedOverviewPlayers().length > 0"
                x-text="t('dashboard.connected_count', { count: connectedOverviewPlayers().length })"></span>
              <span class="page-heading-count page-heading-alert"
                x-show="status.isHost && status.joinAnytimeRoutingCount > 0"
                x-text="t('dashboard.late_join_routing', { count: status.joinAnytimeRoutingCount })"></span>
            </div>
            <div class="empty-state" x-show="connectedOverviewPlayers().length === 0 && !pageError">
              <p x-text="t('dashboard.no_players')"></p>
            </div>
            <div class="empty-state" x-show="pageError">
              <p x-text="pageError"></p>
            </div>
            <div class="players-panel surface-card" x-show="connectedOverviewPlayers().length > 0">
              <template x-for="p in connectedOverviewPlayers()" :key="p.steamId">
                <article class="player-entry" :class="playerRowStateClass(p)">
                  <img class="player-entry-avatar avatar" :src="avatarUrl(p.steamId)" alt="" loading="lazy"
                    decoding="async" @error="onAvatarError($event)">
                  <div class="player-entry-meta">
                    <div class="player-entry-name">
                      <span class="player-entry-display-name" x-text="p.displayName"></span>
                      <span class="badge ping" :class="pingClass(p)"
                        :title="t('dashboard.connection_label', { label: pingLabel(p) })"
                        x-text="pingLabel(p)"></span>
                      <a class="badge badge-link" x-show="status.isHost" :href="'#/player/' + p.steamId"
                        x-text="t('dashboard.badge_stats')"></a>
                      <span class="badge host" x-show="p.isHost" x-text="t('dashboard.badge_host')"></span>
                      <span class="badge local" x-show="p.isLocal" x-text="t('dashboard.badge_you')"></span>
                      <span class="badge alive" x-show="showPlayerAliveState(p) && p.isAlive"
                        x-text="t('dashboard.badge_alive')"></span>
                      <span class="badge dead" x-show="showPlayerAliveState(p) && !p.isAlive"
                        x-text="t('dashboard.badge_dead')"></span>
                      <span class="badge banned" x-show="p.isBanned" x-text="t('dashboard.badge_banned')"></span>
                      <span class="badge late-join" x-show="showLateJoinBadge(p)" x-text="p.lateJoinLabel"></span>
                      <span class="player-entry-actions"
                        x-show="status.isHost && (canModerate(p) || canRespawn(p) || canHeal(p) || p.isBanned)">
                        <button class="btn btn-outlined btn-badge" x-show="canHeal(p)"
                          @click="moderate(p.steamId, 'heal')" x-text="t('dashboard.heal')"></button>
                        <button class="btn btn-outlined btn-badge" x-show="canRespawn(p)"
                          @click="moderate(p.steamId, 'respawn')" x-text="t('dashboard.respawn')"></button>
                        <button class="btn btn-outlined btn-badge" x-show="canModerate(p)"
                          @click="moderate(p.steamId, 'kick')" x-text="t('dashboard.kick')"></button>
                        <button class="btn btn-danger btn-badge" x-show="canModerate(p)"
                          @click="moderate(p.steamId, 'ban')" x-text="t('dashboard.ban')"></button>
                        <button class="btn btn-text btn-badge" x-show="p.isBanned" @click="moderate(p.steamId, 'unban')"
                          x-text="t('dashboard.unban')"></button>
                      </span>
                    </div>
                    <small class="player-entry-detail">
                      <span x-text="playerDetailLines(p).connection"></span>
                      <template x-if="isValidSteamId(p.steamId)">
                        <span class="player-links">
                          <span x-show="playerDetailLines(p).connection"> · </span>
                          <a class="external-link" :href="steamProfileUrl(p.steamId)" target="_blank"
                            rel="noopener noreferrer">Steam</a>
                        </span>
                      </template>
                    </small>
                    <small class="player-entry-detail player-entry-stats-line"
                      x-show="playerDetailLines(p).stats || showPlayerVitals(p)">
                      <span x-show="playerDetailLines(p).stats" x-text="playerDetailLines(p).stats"></span>
                      <span class="player-entry-vitals" x-show="showPlayerVitals(p)">
                        <span class="vital-bar" :title="t('dashboard.vital_health')">
                          <span class="vital-bar-label">HP</span>
                          <span class="vital-bar-track">
                            <span class="vital-bar-fill health"
                              :style="{ width: Math.min(100, Math.max(0, vitalsPercent(p).health ?? 0)) + '%' }"></span>
                            <span class="vital-bar-value" x-text="formatVitalPercent(vitalsPercent(p).health)"></span>
                          </span>
                        </span>
                        <span class="vital-bar" :title="t('dashboard.vital_toxic')">
                          <span class="vital-bar-label">Tox</span>
                          <span class="vital-bar-track">
                            <span class="vital-bar-fill toxic"
                              :style="{ width: Math.min(100, Math.max(0, vitalsPercent(p).toxic ?? 0)) + '%' }"></span>
                            <span class="vital-bar-value" x-text="formatVitalPercent(vitalsPercent(p).toxic)"></span>
                          </span>
                        </span>
                      </span>
                    </small>
                    <div class="player-entry-spawn" x-show="canGiveItem(p) && itemCatalog.length > 0"
                      :key="'spawn-ui-' + p.steamId + '-' + (canGiveItem(p) ? 1 : 0)"
                      x-init="syncSpawnSelection(p.steamId)">
                      <label class="spawn-item-label" x-text="t('dashboard.spawn_item')"></label>
                      <select class="spawn-item-select" :value="getSpawnItemId(p.steamId)"
                        @change="setSpawnItemId(p.steamId, $event.target.value)">
                        <template x-for="group in getItemCatalogGroups()" :key="group.id">
                          <optgroup :label="group.label">
                            <template x-for="item in group.items" :key="item.id">
                              <option :value="item.id" x-text="item.label"></option>
                            </template>
                          </optgroup>
                        </template>
                      </select>
                      <template x-if="hasItemVariants(p.steamId)">
                        <select class="spawn-item-select"
                          :key="'spawn-pct-' + p.steamId + '-' + getSpawnItemId(p.steamId)"
                          x-model.number="spawnSelections[String(p.steamId)].percent">
                          <template x-for="variant in getItemVariants(p.steamId)" :key="variant.percent">
                            <option :value="variant.percent" x-text="formatSpawnPercent(variant.percent)"></option>
                          </template>
                        </select>
                      </template>
                      <button class="btn btn-outlined btn-compact" type="button" @click="giveItem(p)"
                        x-text="t('dashboard.spawn_item_give')"></button>
                    </div>
                  </div>
                </article>
              </template>
            </div>
            <section class="players-stored-section" x-show="storedOverviewPlayers().length > 0">
              <h3 class="players-stored-title">
                <span x-text="t('dashboard.previously_connected')"></span>
                <span class="players-stored-count" x-text="'(' + storedOverviewPlayers().length + ')'"></span>
              </h3>
              <div class="player-chips">
                <template x-for="p in storedOverviewPlayers()" :key="p.steamId">
                  <span class="player-chip-wrap">
                    <a class="player-chip" :class="{ banned: p.isBanned }" :href="'#/player/' + p.steamId"
                      x-text="p.displayName"></a>
                    <button type="button" class="btn btn-text btn-compact player-chip-unban" x-show="p.isBanned"
                      @click="moderate(p.steamId, 'unban')" x-text="t('dashboard.unban')"></button>
                  </span>
                </template>
              </div>
            </section>
          </div>

          <!-- Minimap -->
          <div x-show="status.isConnected && route === 'minimap'" x-cloak>
            <h2 class="page-heading" x-text="t('dashboard.minimap_heading')"></h2>
            <div class="minimap-toolbar surface-card">
              <div class="minimap-toolbar-group">
                <label class="minimap-label" for="minimap-focus" x-text="t('dashboard.minimap_focus')"></label>
                <select id="minimap-focus" class="settings-input settings-select minimap-select"
                  :value="resolveMinimapFocus()" @change="onMinimapFocusChange($event)">
                  <template x-for="p in minimapFocusOptions()" :key="p.steamId">
                    <option :value="String(p.steamId)"
                      x-text="p.displayName + (p.isLocal ? t('dashboard.minimap_you_suffix') : '')"></option>
                  </template>
                </select>
              </div>
              <div class="minimap-toolbar-group" x-show="!isMinimapUserCentric() && minimapAreaOptions().length > 1">
                <label class="minimap-label" for="minimap-area" x-text="t('dashboard.minimap_area')"></label>
                <select id="minimap-area" class="settings-input settings-select minimap-select"
                  :value="minimap.activeAreaId || minimapAreaId" @change="onMinimapAreaChange($event)">
                  <template x-for="area in minimapAreaOptions()" :key="area.id">
                    <option :value="area.id" x-text="area.label"></option>
                  </template>
                </select>
              </div>
              <label class="minimap-toggle" x-show="status.isHost">
                <input type="checkbox" :checked="minimapShowAll" @change="onMinimapShowAllChange($event)">
                <span x-text="t('dashboard.minimap_show_all')"></span>
              </label>
            </div>
            <div class="empty-state" x-show="pageError">
              <p x-text="pageError"></p>
            </div>
            <div class="minimap-panel surface-card" x-show="!pageError">
              <div class="minimap-meta" x-show="minimap">
                <span class="minimap-scene" x-text="minimap?.sceneLabel || t('dashboard.minimap_session')"></span>
                <span class="minimap-area" x-show="minimap?.activeAreaLabel" x-text="minimap?.activeAreaLabel"></span>
                <span class="minimap-mode" x-show="isMinimapUserCentric()" x-text="t('dashboard.minimap_following')"></span>
              </div>
              <div class="empty-state minimap-unavailable" x-show="!minimapShowsMap()">
                <p x-text="isMinimapUserCentric() && minimap?.layoutKind === 'dungeon'
                  ? t('dashboard.minimap_no_map_tram')
                  : t('dashboard.minimap_no_map')"></p>
              </div>
              <div class="minimap-canvas-wrap" x-show="minimapShowsMap()">
                <svg class="minimap-canvas" data-minimap-svg viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet"
                  role="img" aria-label="Session minimap"></svg>
              </div>
              <template x-if="minimap?.markers?.length && minimapShowsMap()">
                <div class="minimap-legend">
                  <template x-for="m in minimap.markers" :key="m.steamId">
                    <span class="minimap-legend-item"
                      :class="{ dead: !playerBlindMode && !m.isAlive, local: m.isLocal, host: m.isHost }"
                      x-text="minimapMarkerSummary(m)"></span>
                  </template>
                </div>
              </template>
              <p class="minimap-hint"
                x-show="minimapShowsMap() && minimap?.layoutKind === 'dungeon' && !minimapHasTileLayout()"
                x-text="t('dashboard.minimap_layout_hint')"></p>
            </div>
          </div>

          <!-- Leaderboard -->
          <div x-show="status.isConnected && route === 'leaderboard'" x-cloak>
            <template x-if="!status.isHost">
              <div class="empty-state">
                <p x-text="t('dashboard.leaderboard_host_only')"></p>
              </div>
            </template>
            <template x-if="status.isHost">
              <div>
                <h2 class="page-heading" x-text="t('dashboard.leaderboard_heading')"></h2>
                <div class="empty-state" x-show="pageError">
                  <p x-text="pageError"></p>
                </div>
                <div class="empty-state"
                  x-show="!pageError && (!leaderboard || !leaderboard.entries || leaderboard.entries.length === 0)">
                  <p x-text="t('dashboard.leaderboard_no_data')"></p>
                </div>
                <template x-if="leaderboard && leaderboard.entries && leaderboard.entries.length > 0">
                  <div>
                    <p class="table-meta"
                      x-text="t('dashboard.leaderboard_updated', { time: leaderboard.updatedAtUtc || '—' })"></p>
                    <div class="table-wrap">
                      <table>
                        <thead>
                          <tr>
                            <th x-text="t('dashboard.leaderboard_col_player')"></th>
                            <th x-text="t('dashboard.leaderboard_col_currency')"></th>
                            <th x-text="t('dashboard.leaderboard_col_mimics')"></th>
                            <th x-text="t('dashboard.leaderboard_col_items')"></th>
                            <th x-text="t('dashboard.leaderboard_col_deaths_revives')"></th>
                            <th x-text="t('dashboard.leaderboard_col_time')"></th>
                            <th x-text="t('dashboard.leaderboard_col_actions')"></th>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="e in leaderboard.entries" :key="e.steamId">
                            <tr :class="{ connected: connectedSet.has(String(e.steamId)) }">
                              <td><a :href="'#/player/' + e.steamId" x-text="e.displayName"></a></td>
                              <td x-text="e.currencyEarned"></td>
                              <td x-text="e.mimicEncounterCount"></td>
                              <td x-text="e.itemCarryCount"></td>
                              <td x-text="(e.survivalDeaths + e.deathmatchDeaths) + '/' + e.revives"></td>
                              <td x-text="formatDuration(e.totalConnectedSeconds)"></td>
                              <td>
                                <button type="button" class="btn btn-text btn-danger btn-compact"
                                  x-show="!connectedSet.has(String(e.steamId))"
                                  @click="deletePlayerData(e.steamId, e.displayName)"
                                  x-text="t('dashboard.delete_player')"></button>
                              </td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                    <p class="table-caption">Highlighted rows are currently connected.</p>
                  </div>
                </template>
              </div>
            </template>
          </div>

          <!-- Player detail -->
          <template x-if="status.isConnected && route === 'player' && steamId">
            <div>
              <div class="player-minimap-embed surface-card"
                x-show="minimapShowsMap() && (minimap?.markers?.length || minimapHasTileLayout())">
                <div class="minimap-embed-header">
                  <h3 class="section-title">Minimap<span class="minimap-embed-area" x-show="minimap?.activeAreaLabel"> ·
                      <span x-text="minimap?.activeAreaLabel"></span></span></h3>
                  <a class="btn-text btn" href="#/minimap">Open full minimap</a>
                </div>
                <div class="minimap-canvas-wrap compact" x-show="minimapShowsMap()">
                  <svg class="minimap-canvas" data-minimap-svg viewBox="0 0 1000 1000"
                    preserveAspectRatio="xMidYMid meet" role="img" aria-label="Player minimap"></svg>
                </div>
              </div>
              <template x-if="!status.isHost">
                <div class="empty-state">
                  <p>Player statistics are only available to the host.</p>
                </div>
              </template>
              <template x-if="status.isHost">
                <div>
                  <div class="loading-panel" x-show="loadingStats">
                    <div class="spinner" role="progressbar" aria-label="Loading statistics"></div>
                  </div>
                  <div x-show="!loadingStats && pageError" class="empty-state">
                    <p x-text="pageError"></p>
                  </div>
                  <div x-show="!loadingStats && !pageError && playerStats">
                    <a class="back-link" href="#/leaderboard">&larr; Back to leaderboard</a>
                    <div class="player-detail-header">
                      <img class="avatar" :src="avatarUrl(steamId)" alt="" @error="onAvatarError($event)">
                      <div>
                        <h2 class="page-heading player-detail-name" x-text="resolveDisplayName(steamId)"></h2>
                        <div class="player-external-links" x-show="isValidSteamId(steamId)">
                          <a class="external-link" :href="steamProfileUrl(steamId)" target="_blank"
                            rel="noopener noreferrer">Steam profile</a>
                        </div>
                        <button type="button" class="btn btn-text btn-danger"
                          x-show="!connectedSet.has(String(steamId))"
                          @click="deletePlayerData(steamId, resolveDisplayName(steamId))"
                          x-text="t('dashboard.delete_player')"></button>
                      </div>
                    </div>
                    <h3 class="section-title">Global</h3>
                    <div class="stat-grid">
                      <template x-for="card in globalStatCards" :key="card[0]">
                        <article class="stat-card">
                          <small x-text="card[0]"></small>
                          <strong x-text="card[1]"></strong>
                        </article>
                      </template>
                    </div>
                    <template x-if="sessionStatCards.length > 0">
                      <div>
                        <h3 class="section-title">Current session</h3>
                        <div class="stat-grid">
                          <template x-for="card in sessionStatCards" :key="card[0]">
                            <article class="stat-card">
                              <small x-text="card[0]"></small>
                              <strong x-text="card[1]"></strong>
                            </article>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </template>

          <!-- Settings (global or per-save) -->
          <div x-show="showSettingsPage()" x-cloak>
            <div class="empty-state" x-show="!canEditCurrentSettings()">
              <p x-text="t('dashboard.settings_host_only')"></p>
            </div>

            <div class="settings-page" x-show="canEditCurrentSettings()">
              <h2 class="page-heading" x-text="settingsPageHeading()"></h2>

              <div class="settings-search-panel surface-card" x-show="settingsDataReady()">
                <label class="settings-search-wrap">
                  <span class="settings-search-label" x-text="t('dashboard.settings_search_label')"></span>
                  <input type="search" class="settings-search"
                    :placeholder="t('dashboard.settings_search_by_placeholder')" x-model="settingsQuery"
                    autocomplete="off" spellcheck="false" role="combobox" :aria-expanded="settingsSearchOpen"
                    :aria-controls="settingsSearchSuggestionsId()" @input="settingsSearchOpen = true"
                    @focus="settingsSearchOpen = true" @blur="onSettingsSearchBlur()"
                    @keydown.escape.prevent="settingsSearchOpen = false">
                  <ul class="settings-suggestions" :id="settingsSearchSuggestionsId()"
                    x-show="settingsSearchOpen && settingsSearchSuggestions.length > 0" x-cloak @mousedown.prevent>
                    <template x-for="item in settingsSearchSuggestions" :key="item.id">
                      <li>
                        <button type="button" class="settings-suggestion" @click="selectSettingsSuggestion(item)">
                          <span class="settings-suggestion-section" x-text="item.sectionTitle"></span>
                          <span x-text="item.title"></span>
                          <span class="settings-suggestion-key" x-text="item.key"></span>
                        </button>
                      </li>
                    </template>
                  </ul>
                </label>
              </div>

              <p class="settings-intro" x-text="settingsIntro()"></p>

              <template x-if="settingsDataReady()">
                <div class="settings-toolbar surface-card">
                  <div class="settings-path">
                    <span class="settings-path-label" x-text="settingsPathLabel()"></span>
                    <code class="settings-path-value" x-text="settingsPathValue()"></code>
                  </div>
                </div>
              </template>

              <div class="empty-state" x-show="pageError">
                <p x-text="pageError"></p>
              </div>
              <div class="loading-panel" x-show="loadingSettings && !pageError">
                <div class="spinner" role="progressbar" :aria-label="t('dashboard.settings_loading_aria')"></div>
              </div>

              <div class="empty-state"
                x-show="!loadingSettings && !pageError && settingsDataReady() && filteredSections.length === 0">
                <p x-text="settingsQuery ? t('dashboard.settings_no_results') : t('dashboard.settings_no_entries')"></p>
              </div>

              <div class="settings-sections" x-show="!loadingSettings && !pageError && filteredSections.length > 0">
                <template x-for="section in filteredSections" :key="section.id">
                  <section class="settings-section surface-card"
                    :class="{ 'is-feature-disabled': section.featureToggle && !featureEnabled(section.id) }">
                    <header class="settings-section-header"
                      :id="section.featureToggle ? settingsDomId(section.id) : null">
                      <div class="settings-section-header-main">
                        <h3 class="settings-section-title" x-text="section.title"></h3>
                        <template x-if="section.featureToggle?.description">
                          <p class="settings-section-desc" x-text="section.featureToggle.description"></p>
                        </template>
                      </div>
                      <div class="settings-section-header-actions">
                        <template x-if="section.featureToggle">
                          <button type="button" class="feature-toggle" role="switch" x-cloak
                            :class="{ 'is-on': featureEnabled(section.id), 'is-saving': isSavingFeatureToggle(section.id) }"
                            :title="section.featureToggle.title" :aria-label="section.featureToggle.title"
                            :aria-checked="featureEnabled(section.id)" :disabled="isSavingFeatureToggle(section.id)"
                            @click.stop="toggleFeature(section.id)">
                            <span class="feature-toggle-track" aria-hidden="true">
                              <span class="feature-toggle-thumb"></span>
                            </span>
                            <span class="feature-toggle-label"
                              x-text="featureEnabled(section.id) ? t('dashboard.on') : t('dashboard.off')"></span>
                          </button>
                        </template>
                        <button type="button" class="btn btn-outlined btn-compact settings-section-reset-btn"
                          x-show="sectionHasResettableEntries(section.id)" :disabled="isResettingSection(section.id)"
                          :title="settingsSectionResetTitle()" @click="resetSectionSettings(section.id)"
                          x-text="t('dashboard.settings_reset_all')">
                        </button>
                        <span class="settings-section-count" x-show="sectionEntryCount(section.id) > 0"
                          x-text="settingsKeysLabel(sectionEntryCount(section.id))"></span>
                      </div>
                    </header>
                    <div class="settings-entries" x-show="sectionEntryCount(section.id) > 0">
                      <template x-for="group in sectionEntryGroups(section.id)"
                        :key="(group.groupId || 'solo') + ':' + group.entries.map((e) => e.key).join('|')">
                        <div class="settings-entry-group" :class="{ 'has-group': group.groupId }">
                          <template x-for="entry in group.entries" :key="entry.key + ':' + settingDraftValue(entry)">
                            <article class="settings-entry" :id="settingsDomId(section.id, entry.key)"
                              :class="[settingEntryClass(entry), { 'is-token-entry': isTokenInputKind(entry) }]">
                              <div class="settings-entry-main">
                                <div class="settings-entry-head">
                                  <strong class="settings-entry-title" x-text="entry.title"></strong>
                                  <span class="settings-type-pill" x-text="entry.type"></span>
                                  <span class="badge settings-override-badge" x-show="showOverrideBadge() && entry.isOverridden"
                                    x-text="t('dashboard.settings_overridden_badge')"></span>
                                  <span class="badge settings-hidden-badge" x-show="entry.isHidden"
                                    x-text="t('dashboard.settings_hidden')"></span>
                                </div>
                                <p class="settings-entry-desc" x-show="entry.description" x-text="entry.description"></p>
                                <code class="settings-key" x-text="entry.key"></code>
                              </div>
                              <div class="settings-entry-value-wrap">
                                <div class="settings-entry-input-row"
                                  :class="{
                                    'settings-entry-input-row--token': isTokenInputKind(entry),
                                    'settings-entry-input-row--stacked': isTokenInputKind(entry) || isSelectInputKind(entry)
                                  }">
                                  <template x-if="entry.type === 'Boolean'">
                                    <select class="settings-input settings-select"
                                      :class="{ 'is-saving': isSavingSetting(section.id, entry) }"
                                      :id="settingInputId(section.id, entry)" :value="settingDraftValue(entry)"
                                      :disabled="isSavingSetting(section.id, entry) || isResettingSection(section.id)"
                                      @change="onBooleanSettingChange(section.id, entry, $event)">
                                      <option value="true" x-text="t('dashboard.on')"></option>
                                      <option value="false" x-text="t('dashboard.off')"></option>
                                    </select>
                                  </template>
                                  <template x-if="entry.type === 'Int32'">
                                    <input type="number" class="settings-input"
                                      :class="{ 'is-saving': isSavingSetting(section.id, entry) }"
                                      :id="settingInputId(section.id, entry)" step="1" inputmode="numeric"
                                      :min="entry.minValue || undefined" :max="entry.maxValue || undefined"
                                      :value="settingDraftValue(entry)"
                                      :disabled="isSavingSetting(section.id, entry) || isResettingSection(section.id)"
                                      @change="onTextSettingCommit(section.id, entry, $event)">
                                  </template>
                                  <template x-if="entry.type === 'Single'">
                                    <input type="number" class="settings-input"
                                      :class="{ 'is-saving': isSavingSetting(section.id, entry) }"
                                      :id="settingInputId(section.id, entry)" step="any" inputmode="decimal"
                                      :min="entry.minValue || undefined" :max="entry.maxValue || undefined"
                                      :value="settingDraftValue(entry)"
                                      :disabled="isSavingSetting(section.id, entry) || isResettingSection(section.id)"
                                      @change="onTextSettingCommit(section.id, entry, $event)">
                                  </template>
                                  <template x-if="isTokenInputKind(entry)">
                                    <div class="token-input-wrap">
                                      <div class="token-input"
                                        :class="{
                                          'is-saving': isSavingSetting(section.id, entry),
                                          'is-focused': tokenInputFocusedFor(section.id, entry),
                                          'is-disabled': isSavingSetting(section.id, entry) || isResettingSection(section.id)
                                        }">
                                        <template x-for="id in parseIdList(settingDraftValue(entry))" :key="id">
                                          <span class="token-chip">
                                            <span class="token-chip-label"
                                              x-text="resolveTokenLabel(id, getTokenCatalog(entry))"></span>
                                            <span class="token-chip-price" x-show="resolveTokenPriceText(id, entry)"
                                              x-text="resolveTokenPriceText(id, entry)"></span>
                                            <span class="token-chip-id" x-text="id"></span>
                                            <button type="button" class="token-chip-remove"
                                              :disabled="isSavingSetting(section.id, entry) || isResettingSection(section.id)"
                                              :aria-label="t('dashboard.settings_token_remove', { label: resolveTokenLabel(id, getTokenCatalog(entry)) })"
                                              @click="removeToken(section.id, entry, id)">
                                              <span aria-hidden="true">×</span>
                                            </button>
                                          </span>
                                        </template>
                                        <input type="text" class="token-input-field"
                                          :id="settingInputId(section.id, entry)"
                                          :value="tokenInputQueryFor(section.id, entry)"
                                          :placeholder="t('dashboard.settings_token_placeholder')"
                                          :disabled="isSavingSetting(section.id, entry) || isResettingSection(section.id)"
                                          autocomplete="off" spellcheck="false" role="combobox"
                                          :aria-expanded="tokenInputOpenFor(section.id, entry)"
                                          :aria-controls="tokenSuggestionsId(section.id, entry)"
                                          @input="onTokenInputInput(section.id, entry, $event)"
                                          @focus="onTokenInputFocus(section.id, entry)"
                                          @blur="onTokenInputBlur(section.id, entry)"
                                          @keydown="onTokenInputKeydown(section.id, entry, $event)"
                                          @paste="onTokenInputPaste(section.id, entry, $event)">
                                        <ul class="token-suggestions" :id="tokenSuggestionsId(section.id, entry)"
                                          x-show="tokenInputOpenFor(section.id, entry) && tokenInputSuggestions(section.id, entry).length > 0"
                                          x-cloak @mousedown.prevent>
                                          <template x-for="suggestion in tokenInputSuggestions(section.id, entry)"
                                            :key="suggestion.id">
                                            <li>
                                              <button type="button" class="token-suggestion"
                                                @click="onTokenSuggestionPick(section.id, entry, suggestion)">
                                                <span class="token-suggestion-label" x-text="suggestion.label"></span>
                                                <span class="token-suggestion-meta">
                                                  <span class="token-suggestion-price" x-show="suggestion.priceText"
                                                    x-text="suggestion.priceText"></span>
                                                  <span class="token-suggestion-id" x-text="suggestion.id"></span>
                                                </span>
                                              </button>
                                            </li>
                                          </template>
                                        </ul>
                                      </div>
                                    </div>
                                  </template>
                                  <template x-if="isSelectInputKind(entry)">
                                    <select class="settings-input settings-select"
                                      :class="{ 'is-saving': isSavingSetting(section.id, entry) }"
                                      :id="settingInputId(section.id, entry)" :value="normalizedSelectValue(entry)"
                                      :disabled="isSavingSetting(section.id, entry) || isResettingSection(section.id)"
                                      @change="onSelectSettingChange(section.id, entry, $event)">
                                      <template x-for="option in entry.selectOptions" :key="option.value">
                                        <option :value="option.value" x-text="option.label"></option>
                                      </template>
                                    </select>
                                  </template>
                                  <template
                                    x-if="entry.type !== 'Boolean' && entry.type !== 'Int32' && entry.type !== 'Single' && !isTokenInputKind(entry) && !isSelectInputKind(entry)">
                                    <input type="text" class="settings-input"
                                      :class="{ 'is-saving': isSavingSetting(section.id, entry) }"
                                      :id="settingInputId(section.id, entry)" :value="settingDraftValue(entry)"
                                      :disabled="isSavingSetting(section.id, entry) || isResettingSection(section.id)"
                                      @change="onTextSettingCommit(section.id, entry, $event)">
                                  </template>
                                  <button type="button" class="btn btn-text btn-compact settings-reset-btn"
                                    x-show="settingCanReset(entry)"
                                    :disabled="isSavingSetting(section.id, entry) || isResettingSection(section.id)"
                                    :title="settingsEntryResetTitle()" @click="resetSetting(section.id, entry)"
                                    x-text="t('dashboard.settings_reset')">
                                  </button>
                                </div>
                                <small class="settings-default-hint" x-show="settingHintVisible(entry)"
                                  x-text="settingHintText(entry)"></small>
                              </div>
                            </article>
                          </template>
                          <p class="settings-group-hint settings-filter-budget-hint"
                            x-show="showLootFilterBudgetHint(section, group)"
                            x-text="lootFilterBudgetHintText(section, group)"></p>
                        </div>
                      </template>
                    </div>
                  </section>
                </template>
              </div>
            </div>
          </div>

        </section>
      </div>
    </main>
  </div>

  <aside id="toast" role="status" aria-live="polite" :class="{ show: toastVisible }" x-text="toastMessage" x-cloak>
  </aside>

  <script defer src="/js/i18n.js"></script>
  <script defer src="/js/api.js"></script>
  <script defer src="/js/sse.js"></script>
  <script defer src="/js/minimap.js"></script>
  <script defer src="/js/settings-format.js"></script>
  <script defer src="/js/settings-token-input.js"></script>
  <script defer src="/js/settings.js"></script>
  <script defer src="/js/dashboard.js"></script>
  <script defer src="/js/alpine.min.js"></script>
</body>

</html>
